baseURL: 'https://LaiaGiraltSole.github.io/'
languageCode: 'en-us'
title: 'Laia Giralt Solé'
theme: 'PaperMod' # Using PaperMod as base but heavily customizing

menus:
  main:
    - identifier: "about"
      name: "About"
      url: /#about
      weight: 10
    - identifier: "projects"
      name: "Projects"
      url: /projects/
      weight: 20
    - identifier: "education"
      name: "Education"
      url: /education/
      weight: 25
    - identifier: "experience"
      name: "Experience"
      url: /experience/
      weight: 30
    - identifier: "resume"
      name: "Resume"
      url: "https://drive.google.com/file/d/1t_70lMrAGWvyqNd1wXLBfOOA-2RjZJMo/view?usp=sharing"

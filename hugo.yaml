params:
  # Disable PaperMod profile mode - using custom layout
  profileMode:
    enabled: false
  
  # Social icons  
  socialIcons:
    - name: email
      url: "mailto:l03gira@cornell.edu"
    - name: linkedin
      url: "https://www.linkedin.com/in/laiagiraltsole/"
    - name: github
      url: "https://github.com/LaiaGiraltSole"

  # Custom portfolio settings
  portfolio:
    name: "Laia Giralt Solé"
    title: "Data Science & Machine Learning"
    subtitle: "Turning data into actionable insights.<br/>Cornell University M.Eng. in Data Science"
    cta: "Let's build something data-driven"
    gradient: true  # Enable gradient backgrounds
    
  # Feature highlights
  highlights:
    - title: "Data Analysis"
      icon: "📊"
      desc: "87K+ records, SQL, Python, statistical modeling"
    - title: "Deep Learning"
      icon: "🧠"
      desc: "Transfer learning, computer vision, ECG classification"
    - title: "Product Impact"
      icon: "🎯"
      desc: "Won DataFest competition with actionable insights"

# These must NOT be indented under params
outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true


